name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root deps
        run: npm install --ignore-scripts
      - name: Root build placeholder
        run: npm run build
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: API syntax check
        run: python -m py_compile apps/api/app/main.py
