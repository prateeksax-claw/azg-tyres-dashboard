name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Secret/data guard
        run: npm run check:secrets
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install API
        run: python -m pip install -e apps/api
      - name: Test API
        run: python -m pytest apps/api/tests
